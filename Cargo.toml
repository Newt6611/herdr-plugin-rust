[workspace]
members = [
    "crates/client",
    "crates/dispatcher",
    "crates/plugin",
    "crates/runtime",
    "examples/minimal",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/herdr/herdr-plugin-rs"
rust-version = "1.75"

[workspace.dependencies]
herdr-client = { path = "crates/client" }
herdr-dispatcher = { path = "crates/dispatcher" }
herdr-plugin = { path = "crates/plugin" }
herdr-runtime = { path = "crates/runtime" }
serde = "1.0.228"
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "sync"] }
